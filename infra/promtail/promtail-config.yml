server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: discovery-service
    static_configs:
      - targets:
          - localhost
        labels:
          job: discovery-service
          __path__: /var/log/services/discovery/*.log

  - job_name: gateway-service
    static_configs:
      - targets:
          - localhost
        labels:
          job: gateway-service
          __path__: /var/log/services/gateway/*.log

  - job_name: product-service
    static_configs:
      - targets:
          - localhost
        labels:
          job: product-service
          __path__: /var/log/services/product/*.log

  - job_name: inventory-service
    static_configs:
      - targets:
          - localhost
        labels:
          job: inventory-service
          __path__: /var/log/services/inventory/*.log

  - job_name: order-service
    static_configs:
      - targets:
          - localhost
        labels:
          job: order-service
          __path__: /var/log/services/order/*.log

  - job_name: notification-service
    static_configs:
      - targets:
          - localhost
        labels:
          job: notification-service
          __path__: /var/log/services/notification/*.log
