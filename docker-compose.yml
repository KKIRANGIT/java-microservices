services:
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ecommerce-network

  kafka:
    image: bitnami/kafka:3.7
    container_name: ecommerce-kafka
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_CFG_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - ecommerce-network

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: ecommerce-kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: ecommerce
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - ecommerce-network

  discovery-service:
    build:
      context: .
      dockerfile: services/discovery-service/Dockerfile
    container_name: discovery-service
    ports:
      - "8761:8761"
    volumes:
      - discovery-logs:/app/logs
    networks:
      - ecommerce-network

  gateway-service:
    build:
      context: .
      dockerfile: services/gateway-service/Dockerfile
    container_name: gateway-service
    ports:
      - "8080:8080"
    depends_on:
      - discovery-service
    volumes:
      - gateway-logs:/app/logs
    networks:
      - ecommerce-network

  product-service:
    build:
      context: .
      dockerfile: services/product-service/Dockerfile
    container_name: product-service
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      discovery-service:
        condition: service_started
    volumes:
      - product-logs:/app/logs
    networks:
      - ecommerce-network

  inventory-service:
    build:
      context: .
      dockerfile: services/inventory-service/Dockerfile
    container_name: inventory-service
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      discovery-service:
        condition: service_started
    volumes:
      - inventory-logs:/app/logs
    networks:
      - ecommerce-network

  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    container_name: order-service
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-service:
        condition: service_started
      product-service:
        condition: service_started
      inventory-service:
        condition: service_started
    volumes:
      - order-logs:/app/logs
    networks:
      - ecommerce-network

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: notification-service
    ports:
      - "8084:8084"
    depends_on:
      kafka:
        condition: service_healthy
      discovery-service:
        condition: service_started
    volumes:
      - notification-logs:/app/logs
    networks:
      - ecommerce-network

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: ecommerce-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - gateway-service
      - product-service
      - inventory-service
      - order-service
      - notification-service
    networks:
      - ecommerce-network

  loki:
    image: grafana/loki:3.2.1
    container_name: ecommerce-loki
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    networks:
      - ecommerce-network

  promtail:
    image: grafana/promtail:3.2.1
    container_name: ecommerce-promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./infra/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - discovery-logs:/var/log/services/discovery:ro
      - gateway-logs:/var/log/services/gateway:ro
      - product-logs:/var/log/services/product:ro
      - inventory-logs:/var/log/services/inventory:ro
      - order-logs:/var/log/services/order:ro
      - notification-logs:/var/log/services/notification:ro
    depends_on:
      - loki
    networks:
      - ecommerce-network

  grafana:
    image: grafana/grafana:11.1.4
    container_name: ecommerce-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - ecommerce-network

  storefront:
    image: nginx:1.27-alpine
    container_name: ecommerce-storefront
    ports:
      - "5173:80"
    volumes:
      - ./ui/storefront:/usr/share/nginx/html:ro
      - ./ui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - gateway-service
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    driver: bridge

volumes:
  postgres-data:
  kafka-data:
  prometheus-data:
  loki-data:
  grafana-data:
  discovery-logs:
  gateway-logs:
  product-logs:
  inventory-logs:
  order-logs:
  notification-logs:
