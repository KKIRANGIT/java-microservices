spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/products/**
          filters:
            - name: CircuitBreaker
              args:
                name: productGatewayCircuitBreaker
                fallbackUri: forward:/fallback/product-service
            - name: Retry
              args:
                retries: 2
                methods:
                  - GET
                statuses:
                  - BAD_GATEWAY
                  - SERVICE_UNAVAILABLE
                  - GATEWAY_TIMEOUT
        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/api/inventory/**
          filters:
            - name: CircuitBreaker
              args:
                name: inventoryGatewayCircuitBreaker
                fallbackUri: forward:/fallback/inventory-service
            - name: Retry
              args:
                retries: 2
                methods:
                  - GET
                statuses:
                  - BAD_GATEWAY
                  - SERVICE_UNAVAILABLE
                  - GATEWAY_TIMEOUT
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
          filters:
            - name: CircuitBreaker
              args:
                name: orderGatewayCircuitBreaker
                fallbackUri: forward:/fallback/order-service
            - name: Retry
              args:
                retries: 1
                methods:
                  - GET
                statuses:
                  - BAD_GATEWAY
                  - SERVICE_UNAVAILABLE
                  - GATEWAY_TIMEOUT
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
          filters:
            - name: CircuitBreaker
              args:
                name: notificationGatewayCircuitBreaker
                fallbackUri: forward:/fallback/notification-service
            - name: Retry
              args:
                retries: 2
                methods:
                  - GET
                statuses:
                  - BAD_GATEWAY
                  - SERVICE_UNAVAILABLE
                  - GATEWAY_TIMEOUT
        - id: discovery-service-openapi
          uri: lb://discovery-service
          predicates:
            - Path=/v3/api-docs/discovery-service
          filters:
            - RewritePath=/v3/api-docs/discovery-service, /v3/api-docs
        - id: product-service-openapi
          uri: lb://product-service
          predicates:
            - Path=/v3/api-docs/product-service
          filters:
            - RewritePath=/v3/api-docs/product-service, /v3/api-docs
        - id: inventory-service-openapi
          uri: lb://inventory-service
          predicates:
            - Path=/v3/api-docs/inventory-service
          filters:
            - RewritePath=/v3/api-docs/inventory-service, /v3/api-docs
        - id: order-service-openapi
          uri: lb://order-service
          predicates:
            - Path=/v3/api-docs/order-service
          filters:
            - RewritePath=/v3/api-docs/order-service, /v3/api-docs
        - id: notification-service-openapi
          uri: lb://notification-service
          predicates:
            - Path=/v3/api-docs/notification-service
          filters:
            - RewritePath=/v3/api-docs/notification-service, /v3/api-docs
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka
    filter-only-up-instances: true
    registry-fetch-interval-seconds: 5

management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://tempo:4318/v1/traces
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  file:
    name: /app/logs/gateway-service.log
  pattern:
    level: "%5p [${spring.application.name:},traceId=%X{traceId:-},spanId=%X{spanId:-}]"

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    urls-primary-name: gateway-service
    urls:
      - name: gateway-service
        url: /v3/api-docs
      - name: discovery-service
        url: /v3/api-docs/discovery-service
      - name: product-service
        url: /v3/api-docs/product-service
      - name: inventory-service
        url: /v3/api-docs/inventory-service
      - name: order-service
        url: /v3/api-docs/order-service
      - name: notification-service
        url: /v3/api-docs/notification-service

resilience4j:
  circuitbreaker:
    instances:
      productGatewayCircuitBreaker:
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 20s
        permitted-number-of-calls-in-half-open-state: 5
      inventoryGatewayCircuitBreaker:
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 20s
        permitted-number-of-calls-in-half-open-state: 5
      orderGatewayCircuitBreaker:
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 20s
        permitted-number-of-calls-in-half-open-state: 5
      notificationGatewayCircuitBreaker:
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 20s
        permitted-number-of-calls-in-half-open-state: 5

app:
  gateway:
    rate-limiter:
      enabled: true
      capacity: 80
      refill-tokens: 80
      refill-duration: 1s


