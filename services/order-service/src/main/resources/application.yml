spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://postgres:5432/order_db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  kafka:
    bootstrap-servers: kafka:9092
    listener:
      observation-enabled: true
    template:
      observation-enabled: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: order-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: com.ecommerce.order.event.InventoryProcessedEvent
        spring.json.use.type.headers: false

server:
  port: 8083

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka

management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://tempo:4318/v1/traces
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  file:
    name: /app/logs/order-service.log
  pattern:
    level: "%5p [${spring.application.name:},traceId=%X{traceId:-},spanId=%X{spanId:-}]"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

resilience4j:
  circuitbreaker:
    instances:
      productServiceCircuitBreaker:
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 20s
        permitted-number-of-calls-in-half-open-state: 5
        ignore-exceptions:
          - com.ecommerce.order.service.ProductNotFoundException
  retry:
    instances:
      productServiceRetry:
        max-attempts: 3
        wait-duration: 300ms
        retry-exceptions:
          - com.ecommerce.order.service.ProductServiceUnavailableException
        ignore-exceptions:
          - com.ecommerce.order.service.ProductNotFoundException
  ratelimiter:
    instances:
      productServiceRateLimiter:
        limit-for-period: 30
        limit-refresh-period: 1s
        timeout-duration: 0
  bulkhead:
    instances:
      productServiceBulkhead:
        max-concurrent-calls: 25
        max-wait-duration: 0

outbox:
  publisher:
    fixed-delay-ms: 1500
